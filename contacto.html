    <meta charset="utf-8" />

    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <header>
        <nav>
            <div class="marca-personal">
                <img src="img/svg/marca-personal.svg" width="43" height="30" alt="marca personal">
                <h1>OLIVIA HARRISON</h1>
            </div>

            <ul id="botones">
                <li>
                    <a href="index.html">INICIO</a>
                </li>
                <li>
                    <a href="sobre-mi.html">SOBRE MI</a>

                <li>
                    <a href="proyectos.html">MIS PROYECTOS</a>

                <li>
                    <a href="indice.html">ÍNDICE</a>
                </li>
                <li>
                    <a href="contacto.html">CONTACTO</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contacto">
            <!-- Titulo -->
            <article class="titulo">
                <h2>Si querés</h2>
                <h2>trabajar juntos...</h2>
                <h3>hablemos!</h3>
            </article>

            <!-- Formulario -->
            <form method="post" action="#" target="_blank" enctype="text/plain ">

                <!-- Nombre -->
                <input type="text" name="Nombre" id="Nombre" placeholder="Nombre completo" required>

                <!-- Correo -->
                <input type="email" name="Email" id="Email" placeholder="Correo" required>

                <!-- Servicios -->
                <select id="Servicios" name="Servicios" required>
                    <option value="" disabled selected hidden>Servicios</option>
                    <option value="branding">Branding / Identidad visual</option>
                    <option value="diseno-web">Diseño Web / UI UX</option>
                    <option value="editorial">Diseño Editorial</option>
                    <option value="otro">Otro</option>
                </select>

                <!-- Detalles -->
                <textarea id="mensaje" name="mensaje" placeholder="Detalles sobre tu proyecto..."></textarea>

                <!-- botón -->
                 <div class="boton">
                <button type="submit" class="boton-enviar">Enviar</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="contenedor">
            <article class="catedra">
                <p>Cátedra Wiscñevsky, 2026</p>
                <p>© 2026 Portfolio. Todos los derechos reservados.</p>
            </article>
            <div class="redes">
                <a href="#"><img src="img/svg/logo-ig.svg" alt="Logo instagram" width="25" height="25" /></a>

                <a href="#"><img src="img/svg/logo-facebook.svg" alt="Logo Facebook" width="25" height="25" /></a>

                <a href="#"><img src="img/svg/logo-behance.svg" alt="Logo tiktok" width="25" height="25" /></a>
            </div>
        </div>
    </footer>
</body>
</html>
